<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Void Runner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="game-wrap">
    <div id="hud">
      <span id="hud-score">Score: 0</span>
      <span id="hud-level">Level 1</span>
      <span id="hud-lives">♥ ♥ ♥</span>
    </div>
    <!-- p5.js mounts the canvas here -->
  </div>

  <div id="controls-hint">Arrow keys / WASD to move &nbsp;·&nbsp; Spacebar to shoot</div>

  <!-- p5.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- Game modules (order matters) -->
  <script src="js/audio.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/ship.js"></script>
  <script src="js/bullet.js"></script>
  <script src="js/asteroid.js"></script>
  <script src="js/crystal.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/sketch.js"></script>
</body>
</html>
